      name: time
      group: main
    details:
      type: raw
      field: details
      name: details
      group: main
    res:
      type: raw
      field: res
      name: res
      group: main
    date:
      type: date
      list: true
      field: date
      name: date
      group: main
    user:
      list: true
      index: true
      show: user.name
      type: relation
      model: auth__account
      field: user
      name: user
      group: main
    setting:
      type: raw
      field: setting
      name: setting
      group: main
