      type: string
      field: province
      name: province
      group: main
  filters:
    - CurrentUser
    - Province
  search:
    - name
    - upload_type
    - user.name
  order_by:
    created_at: desc
  analysis:
    main:
      invalid: invalid
      duplication: duplication
      duplication_details: duplication_details
      no_of_raw: no_of_raw
      progress: progress
      time: time
