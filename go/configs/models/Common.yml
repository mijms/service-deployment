      field: user
      name: user
      group: main
common__module:
  fields:
    name:
      type: string
      list: true
      field: name
      name: name
      group: main
    path:
      type: string
      list: true
      validates:
        minLength: 1
      field: path
      name: path
      group: main
    app:
      type: relation
      list: true
      model: apps__app
      field: app
      name: app
      group: main
  filters:
    - CurrentApps
  search:
    - name
    - path
  generate:
    - app
    - path
  analysis:
    main: {}
common__permission:
  fields:
    role:
      type: relation
      filter: true
      list: true
      model: common__role
      field: role
      name: role
      group: main
    create:
      list: true
      type: boolean
      field: create
      name: create
      group: main
    edit:
      list: true
      type: boolean
      field: edit
      name: edit
      group: main
    delete:
      list: true
      type: boolean
      field: delete
      name: delete
      group: main
    fetch:
      list: true
      type: boolean
      field: fetch
      name: fetch
      group: main
    module:
      list: true
      details: true
      type: relation
      model: common__module
      field: module
      name: module
      group: main
    org:
      type: relation
      hide: true
      model: org__org
      field: org
      name: org
      group: main
  search:
    - module.name
    - role.name
  analysis:
    main: {}
common__role:
  fields:
    name:
      type: string
      list: true
      field: name
      name: name
      group: main
    permissions:
      type: inversed
      model: common__permission
      mapped: role
      field: permissions
      name: permissions
      group: main
    app:
      type: string
      hide: true
      field: app
      name: app
      group: main
    org:
      type: string
      hide: true
      field: org
      name: org
      group: main
  search:
    - name
  filters:
    - CurrentApps
  mappings:
    app: app
  analysis:
    main: {}
common__lang:
