sites__site:
  fields:
    url:
      type: string
      list: true
      field: url
      name: url
      group: main
    langs:
      type: collection
      front:
        type: MultiSelect
        request: getSelectCommonLangQuery
      field: langs
      name: langs
      group: main
    app:
      type: string
      hide: true
      field: app
      name: app
      group: main
    setting:
      type: raw
      field: setting
      name: setting
      group: main
    theme:
      type: raw
      front:
        hideFilter: true
        type: ColorPickerField
        var:
          bg:
            type: color
          primary:
            type: color
          secondary:
            type: color
          headertext:
            type: textstyle
          maintext:
            type: textstyle
          subtext:
            type: textstyle
      field: theme
      name: theme
      group: main
    secure:
      type: string
      group: secure
      field: secure
      name: secure
    image:
      type: relation
      model: files__file
      field: image
      name: image
      group: main
    org:
      type: string
      field: org
      name: org
      group: main
    company:
      type: string
      field: company
      name: company
      group: main
  generate:
    - url
  search:
    - url
  select_include:
    - Auth
    - Apps
    - Common
  filters:
    - OrgOrNull
    - MainApp
  mappings:
    org: org
    app: app
    company: company
  analysis:
    main: {}
sites__template:
