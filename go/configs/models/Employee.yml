      type: string
      hide: true
      field: org
      name: org
      group: main
    company:
      type: string
      hide: true
      field: company
      name: company
      group: main
    department:
      type: relation
      model: org__department
      show: department.name
      field: department
      name: department
      group: main
    conditions:
      type: raw
      field: conditions
      name: conditions
      group: main
  filters:
    - Company
    - Org
  search:
    - name
    - level.name
  mappings:
    company: company
    org: org
  analysis:
    main:
      task_completion: task_completion
employee__skill:
  fields:
    name:
      type: string
      list: true
      field: name
      name: name
      group: main
    type:
      type: string
      list: true
      front:
        type: Select
        options:
          - pid: measurable_skills
            name: Measurable Skills
          - pid: non_measurable_skills
            name: Non Measurable Skills
          - pid: condition_skills
            name: Condition Skills
      field: type
      name: type
      group: main
    target_value:
      type: float
      list: true
      field: target_value
      name: target_value
      group: main
    level:
      list: true
      type: relation
      model: employee__level
      front:
        show:
          - name
          - code
      field: level
      name: level
      group: main
    competency:
      type: relation
      model: common__category
      params:
        type: competency
      field: competency
      name: competency
      group: main
    category:
      type: relation
      model: common__category
      params:
        type: skill
      field: category
      name: category
      group: main
    department:
      type: relation
      model: org__department
      show: department.name
      list: true
      field: department
      name: department
      group: main
    company:
      hide: true
      type: relation
      model: org__company
      field: company
      name: company
      group: main
    org:
      hide: true
      type: relation
      model: org__org
      field: org
      name: org
      group: main
    setting:
      type: raw
      field: setting
      name: setting
      group: main
  filters:
    - Org
    - Company
  generate:
    - level
    - name
  search:
    - name
    - type
    - level.name
    - level.code
  imports:
    keys:
      - company
      - title
      - required
    inserts:
      - common__category
      - employee__level
      - org__department
    fetching:
      common__category:
        filters:
          type:
            $in:
              - skill
              - competency
      employee__level:
        keys:
          - company
          - name
      org__department: {}
    fixed:
      target_value: 3
      type: non_measurable_skills
    mappings:
      name: required
      department:
        module: org__department
        keys:
          - company
          - name
        create_maps:
          company: company
          name: department
          org: org
          app: app
      level:
        module: employee__level
        keys:
          - company
          - name
        create_maps:
          company: company
          name: title
          code: zone
          department: department
          org: org
      competency:
        module: common__category
        keys:
          - company
          - name
        fixed:
          type: competency
          app: hr_manager
        create_maps:
          company: company
          name: competency
      category:
        module: common__category
        keys:
          - company
          - name
        fixed:
          type: skill
          app: hr_manager
        create_maps:
          company: company
          name: skill set
  mappings:
    org: org
    company: company
  analysis:
    main:
      target_value: target_value
employee__skill_approval:
  fields:
    user:
      list: true
      type: relation
      model: auth__account
      show: user.name
      field: user
      name: user
      group: main
    skill:
      list: true
      type: relation
      model: employee__skill
      field: skill
      name: skill
      group: main
    date:
      type: date
      field: date
      name: date
      group: main
    amount:
      type: integer
      default: 1
      list: true
      field: amount
      name: amount
      group: main
    description:
      type: string
      list: true
      field: description
      name: description
      group: main
    status:
      type: string
      list: true
      front:
        type: Select
        options:
          - pid: in review
            name: In review
          - pid: done
            name: Done
          - pid: rejected
            name: Rejected
      column:
        type: status
        sortable: false
      field: status
      name: status
      group: main
    reviewer:
      type: relation
      model: auth__account
      front:
        ps:
          type: manager
      field: reviewer
      name: reviewer
      group: main
    workspace:
      type: relation
      model: project__work_space
      list: true
      show: workspace.type
      colName: type
      field: workspace
      name: workspace
      group: main
    project:
      type: relation
      model: project__project
      field: project
      name: project
      group: main
    company:
      hide: true
      type: relation
      model: org__company
      field: company
      name: company
      group: main
    org:
      hide: true
      type: relation
      model: org__org
      field: org
      name: org
      group: main
  hooks:
    pre_save:
      update_skill_track:
        module: employee__skill_track
        action: updateOne
        filter:
          org: value.org.id
          user: value.user.id
          level: value.skill.level.id
          company: value.company.id
          skill: value.skill.id
        update:
          $inc:
            current_value: value.amount
          $set:
            updated_at: TodayMongoDate
            end_date: TodayMongoDate
          $setOnInsert:
            _id: GenerateId
            created_at: TodayMongoDate
            start_date: TodayMongoDate
        fun: state_change
        from:
          status: in review
        to:
          status: done
  mappings:
    org: org
    company: company
  filters:
    CurrentUserOrManager:
      fields:
        - reviewer
    Org: {}
    Company: {}
  search:
    - user.name
    - skill.name
  analysis:
    main:
      amount: amount
