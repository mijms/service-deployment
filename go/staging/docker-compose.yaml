version: '3.8'
services:
  go-staging:
    image: alpine:3.20
    container_name: go-staging
    working_dir: /app
    restart: ${RESTART_POLICY}
    env_file:
      - .env.prod
    environment:
      - APP_ROOT=/app
      - APP_NAME=staging
      - TZ
      - SERVER_PORT
      - MONGODB_URL
      - MONGODB_DATABASE
      - MONGODB_USER
      - MONGODB_PASS
      - JWT_SECRET
      - JWT_EXPIRATION_MS
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    volumes:
      - ../build/staging:/app/server
      - ../templates:/app/templates
      - ../env.prod:/app/.env
      - ../go.mod:/app/go.mod
      - ../configs:/app/configs
    command: ./server
    networks:
      - ukkera
networks:
  ukkera:
    external: true